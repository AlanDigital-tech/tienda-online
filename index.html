<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba JavaScript</title>

<style>
    body {
        font-family: Arial;
        background: #111;
        color: white;
        text-align: center;
        padding: 40px;
    }

    button {
        padding: 15px 25px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 10px;
        border: none;
        background: #00c6ff;
        color: white;
    }

    button:hover {
        background: #0072ff;
    }

    #estado {
        margin-top: 20px;
        font-size: 20px;
        color: #00ffcc;
    }
</style>

</head>

<body>

<h1>🔧 Prueba de JavaScript</h1>

<p>Carrito: <span id="contador">0</span></p>

<button onclick="sumar()">➕ Agregar</button>
<button onclick="restar()">➖ Quitar</button>
<button onclick="resetear()">🔄 Resetear</button>

<div id="estado">Esperando acción...</div>

<script>
    let contador = 0;

    function sumar() {
        contador++;
        actualizar();
    }

    function restar() {
        contador--;
        actualizar();
    }

    function resetear() {
        contador = 0;
        actualizar();
    }

    function actualizar() {
        document.getElementById("contador").innerText = contador;

        if (contador > 0) {
            document.getElementById("estado").innerText = "✔ JavaScript funcionando correctamente";
        } else {
            document.getElementById("estado").innerText = "⚠ Carrito vacío";
        }
    }
</script>

</body>
</html>
