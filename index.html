
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alan Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

header{
  background:orange;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.productos{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.producto img{
  width:100%;
  border-radius:10px;
}

button{
  margin-top:10px;
  padding:8px;
  background:green;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div class="productos" id="productos"></div>

<script>
const productos = [
{
nombre:"Cargador 🔌",
precio:10,
img:"https://via.placeholder.com/150"
},
{
nombre:"Auriculares 🎧",
precio:20,
img:"https://via.placeholder.com/150"
},
{
nombre:"Parlante 🔊",
precio:30,
img:"https://via.placeholder.com/150"
}
];

const contenedor = document.getElementById("productos");

productos.forEach(p=>{
contenedor.innerHTML += `
<div class="producto">
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>
<button>Agregar</button>
</div>
`;
});
</script>

</body>
</html>
