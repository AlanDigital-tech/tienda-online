<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 15px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

/* BUSCADOR */
.buscador {
  padding: 10px;
  text-align: center;
}

.buscador input {
  width: 80%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
}

/* PRODUCTOS */
.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

.producto {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.producto img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.precio {
  font-weight: bold;
  color: green;
}

.controles {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 5px;
}

.controles button {
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.agregar { background: green; color: white; }
.quitar { background: red; color: white; }

/* DETALLE */
.detalle {
  display: none;
  padding: 20px;
  text-align: center;
}

.detalle img {
  width: 250px;
}

/* CARRITO FLOTANTE */
.carrito-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #007bff;
  color: white;
  padding: 15px;
  border-radius: 50px;
  font-size: 18px;
  cursor: pointer;
}

.carrito-panel {
  position: fixed;
  bottom: 80px;
  right: 10px;
  width: 250px;
  background: white;
  border-radius: 12px;
  padding: 10px;
  display: none;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.item {
  font-size: 14px;
  margin: 5px 0;
}

.eliminar {
  background: red;
  color: white;
  border: none;
  padding: 3px 6px;
  margin-left: 5px;
  cursor: pointer;
}

.enviar {
  width: 100%;
  background: green;
  color: white;
  padding: 10px;
  border: none;
  margin-top: 10px;
}

</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div class="buscador">
  <input type="text" id="buscar" placeholder="🔍 Buscar producto...">
</div>

<div id="lista" class="productos"></div>
<div id="detalle" class="detalle"></div>

<!-- BOTÓN CARRITO -->
<div class="carrito-btn" onclick="toggleCarrito()">
🛒 (<span id="cantidad">0</span>)
</div>

<!-- PANEL CARRITO -->
<div id="carritoPanel" class="carrito-panel">
  <h3>Carrito</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button class="enviar" onclick="enviar()">Enviar pedido</button>
</div>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg", desc:"⚡ Carga ultra rápida."},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg", desc:"🎧 Sonido potente."},
{nombre:"Parlante", precio:17000, img:"parlante.jpg", desc:"🔊 Ideal para música."},
{nombre:"Secador", precio:11000, img:"secador.jpg", desc:"💨 Secado rápido."},
{nombre:"Batidora", precio:13000, img:"batidora.jpg", desc:"🥣 Fácil y rápido."},
{nombre:"Sartenes", precio:16000, img:"sarten.jpg", desc:"🍳 Antiadherente."},
{nombre:"TV Box", precio:24000, img:"tvbox.jpg", desc:"📺 Smart TV."},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg", desc:"🎮 Juegos retro."},
{nombre:"Tira LED", precio:4500, img:"led.jpg", desc:"🌈 Iluminación."},
{nombre:"Termo", precio:8000, img:"termo.jpg", desc:"🧉 Mantiene calor."},
{nombre:"Licuadora", precio:15000, img:"licuadora.jpg", desc:"🍹 Potente."}
];

let carrito = {};

const lista = document.getElementById("lista");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const cantidadTexto = document.getElementById("cantidad");
const buscador = document.getElementById("buscar");

function mostrarProductos(filtro=""){
  lista.innerHTML="";
  productos
    .filter(p => p.nombre.toLowerCase().includes(filtro.toLowerCase()))
    .forEach((p,i)=>{
      lista.innerHTML+=`
        <div class="producto">
          <img src="${p.img}" onclick="verDetalle(${i})">
          <h3>${p.nombre}</h3>
          <p class="precio">$${p.precio}</p>

          <div class="controles">
            <button class="quitar" onclick="restar(${i})">-</button>
            <span id="cant-${i}">0</span>
            <button class="agregar" onclick="sumar(${i})">+</button>
          </div>
        </div>
      `;
    });
}

buscador.addEventListener("keyup", e=>{
  mostrarProductos(e.target.value);
});

function sumar(i){
  carrito[i] = (carrito[i] || 0) + 1;
  actualizar();
}

function restar(i){
  if(carrito[i]){
    carrito[i]--;
    if(carrito[i] <= 0) delete carrito[i];
    actualizar();
  }
}

function actualizar(){
  items.innerHTML="";
  let total = 0;
  let cantidad = 0;

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];
    total += p.precio * cant;
    cantidad += cant;

    document.getElementById("cant-"+i).innerText = cant;

    items.innerHTML += `
      <div class="item">
        ${p.nombre} x${cant} - $${p.precio * cant}
      </div>
    `;
  });

  totalTexto.innerText = "Total: $" + total;
  cantidadTexto.innerText = cantidad;
}

function toggleCarrito(){
  let panel = document.getElementById("carritoPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function enviar(){
  let texto = "Hola, quiero comprar:%0A";
  let total = 0;

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];
    texto += "- " + p.nombre + " x" + cant + "%0A";
    total += p.precio * cant;
  });

  texto += "%0ATotal: $" + total;
  texto += "%0AEntrega inmediata";

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
