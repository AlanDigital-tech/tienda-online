<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 12px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* BUSCADOR */
.buscador {
  padding: 10px;
  text-align: center;
  position: relative;
}

.buscador input {
  width: 90%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
}

/* SUGERENCIAS */
.sugerencias {
  position: absolute;
  top: 50px;
  left: 5%;
  width: 90%;
  background: white;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 1000;
}

.sugerencias div {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.sugerencias div:hover {
  background: #f0f0f0;
}

/* PRODUCTOS */
.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  padding: 10px;
}

.producto {
  background: white;
  border-radius: 10px;
  padding: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.producto img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.precio {
  color: green;
  font-weight: bold;
}

/* CONTROLES */
.controles {
  display: flex;
  justify-content: center;
  gap: 5px;
}

.controles button {
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
}

.agregar { background: green; color: white; }
.quitar { background: red; color: white; }

/* CARRITO */
.carrito-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #007bff;
  color: white;
  padding: 12px;
  border-radius: 50px;
  font-size: 16px;
}

.carrito-panel {
  position: fixed;
  bottom: 70px;
  right: 10px;
  width: 90%;
  max-width: 300px;
  background: white;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

.enviar {
  width: 100%;
  background: green;
  color: white;
  padding: 10px;
  border: none;
}

</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div class="buscador">
  <input type="text" id="buscar" placeholder="🔍 Buscar producto...">
  <div id="sugerencias" class="sugerencias"></div>
</div>

<div id="lista" class="productos"></div>

<div class="carrito-btn" onclick="toggleCarrito()">
🛒 (<span id="cantidad">0</span>)
</div>

<div id="carritoPanel" class="carrito-panel">
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button class="enviar" onclick="enviar()">Enviar pedido</button>
</div>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg"},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg"},
{nombre:"Parlante", precio:17000, img:"parlante.jpg"},
{nombre:"Secador", precio:11000, img:"secador.jpg"},
{nombre:"Batidora", precio:13000, img:"batidora.jpg"},
{nombre:"Sartenes", precio:16000, img:"sarten.jpg"},
{nombre:"TV Box", precio:24000, img:"tvbox.jpg"},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg"},
{nombre:"Tira LED", precio:4500, img:"led.jpg"},
{nombre:"Termo", precio:8000, img:"termo.jpg"},
{nombre:"Licuadora", precio:15000, img:"licuadora.jpg"}
];

let carrito = {};

const lista = document.getElementById("lista");
const buscador = document.getElementById("buscar");
const sugerencias = document.getElementById("sugerencias");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const cantidadTexto = document.getElementById("cantidad");

function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto" id="prod-${i}">
        <img src="${p.img}">
        <h4>${p.nombre}</h4>
        <p class="precio">$${p.precio}</p>

        <div class="controles">
          <button class="quitar" onclick="restar(${i})">-</button>
          <span id="cant-${i}">0</span>
          <button class="agregar" onclick="sumar(${i})">+</button>
        </div>
      </div>
    `;
  });
}

buscador.addEventListener("keyup", e=>{
  let texto = e.target.value.toLowerCase();
  sugerencias.innerHTML="";

  if(texto === "") return;

  productos.forEach((p,i)=>{
    if(p.nombre.toLowerCase().includes(texto)){
      sugerencias.innerHTML += `
        <div onclick="irProducto(${i})">${p.nombre}</div>
      `;
    }
  });
});

function irProducto(i){
  document.getElementById("prod-"+i).scrollIntoView({behavior:"smooth"});
  sugerencias.innerHTML="";
}

function sumar(i){
  carrito[i] = (carrito[i] || 0) + 1;
  actualizar();
}

function restar(i){
  if(carrito[i]){
    carrito[i]--;
    if(carrito[i] <= 0) delete carrito[i];
    actualizar();
  }
}

function actualizar(){
  items.innerHTML="";
  let total = 0;
  let cantidad = 0;

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];

    total += p.precio * cant;
    cantidad += cant;

    document.getElementById("cant-"+i).innerText = cant;

    items.innerHTML += `
      <div>${p.nombre} x${cant}</div>
    `;
  });

  totalTexto.innerText = "Total: $" + total;
  cantidadTexto.innerText = cantidad;
}

function toggleCarrito(){
  let panel = document.getElementById("carritoPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function enviar(){
  let texto = "Hola, quiero comprar:%0A";
  let total = 0;

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];
    texto += "- " + p.nombre + " x" + cant + "%0A";
    total += p.precio * cant;
  });

  texto += "%0ATotal: $" + total;
  texto += "%0AEntrega inmediata";

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
