<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  margin: 0;
}

/* HEADER */
header {
  background: linear-gradient(90deg,#ffcc00,#ff8800);
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

/* PRODUCTOS */
.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.producto {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.producto:hover {
  transform: scale(1.05);
}

.producto img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
}

/* BOTONES */
.agregar, .cantidad button {
  background: #28a745;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
}

.cantidad {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
  margin-top: 5px;
}

.eliminar {
  background: red;
  color: white;
  border: none;
  margin-left: 5px;
}

.enviar {
  width: 100%;
  background: #25D366;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 6px;
  margin-top: 5px;
}

/* CARRITO */
.carrito {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 3px solid #ff8800;
  padding: 10px;
}

#items {
  max-height: 120px;
  overflow-y: auto;
}

/* BOTON WHATSAPP FLOTANTE */
.whatsapp {
  position: fixed;
  bottom: 90px;
  right: 15px;
  background: #25D366;
  color: white;
  font-size: 24px;
  padding: 12px;
  border-radius: 50%;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 10px;
  background: #222;
  color: white;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div id="lista" class="productos"></div>

<div class="carrito">
  <h3>🛒 Tu pedido</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button class="enviar" onclick="enviar()">Finalizar compra</button>
</div>

<a class="whatsapp" href="https://wa.me/543876629623" target="_blank">💬</a>

<footer>📱 Contacto directo por WhatsApp</footer>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg", desc:"⚡ Carga rápida 🔋"},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg", desc:"🎧 Sonido potente"},
{nombre:"Parlante", precio:17000, img:"parlante.jpg", desc:"🔊 Volumen alto"},
{nombre:"Secador", precio:11000, img:"secador.jpg", desc:"💨 Secado rápido"},
{nombre:"Batidora", precio:13000, img:"batidora.jpg", desc:"🥣 Fácil uso"},
{nombre:"Sartenes", precio:16000, img:"sarten.jpg", desc:"🍳 Antiadherente"},
{nombre:"TV Box", precio:24000, img:"tvbox.jpg", desc:"📺 Smart TV"},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg", desc:"🎮 Juegos retro"},
{nombre:"Tira LED", precio:4500, img:"led.jpg", desc:"🌈 Luces RGB"},
{nombre:"Termo", precio:8000, img:"termo.jpg", desc:"🧉 Mantiene calor"},
{nombre:"Licuadora", precio:15000, img:"licuadora.jpg", desc:"🍹 Potente"}
];

let carrito = [];

const lista = document.getElementById("lista");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");

function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto">
        <img src="${p.img}">
        <h3>${p.nombre}</h3>
        <p>${p.desc}</p>
        <p><b>$${p.precio}</b></p>
        <button class="agregar" onclick="agregar(${i})">Agregar</button>
      </div>
    `;
  });
}

function agregar(i){
  let item = carrito.find(p => p.nombre === productos[i].nombre);

  if(item){
    item.cantidad++;
  } else {
    carrito.push({...productos[i], cantidad:1});
  }

  actualizarCarrito();
}

function cambiarCantidad(index, cambio){
  carrito[index].cantidad += cambio;

  if(carrito[index].cantidad <= 0){
    carrito.splice(index,1);
  }

  actualizarCarrito();
}

function actualizarCarrito(){
  items.innerHTML="";
  let total = 0;

  carrito.forEach((p,i)=>{
    total += p.precio * p.cantidad;

    items.innerHTML += `
      <div>
        ${p.nombre} x${p.cantidad} - $${p.precio * p.cantidad}
        <div class="cantidad">
          <button onclick="cambiarCantidad(${i},-1)">-</button>
          <button onclick="cambiarCantidad(${i},1)">+</button>
          <button class="eliminar" onclick="cambiarCantidad(${i},-999)">X</button>
        </div>
      </div>
    `;
  });

  totalTexto.innerText = "Total: $" + total;
}

function enviar(){
  if(carrito.length === 0){
    alert("Agregá productos primero");
    return;
  }

  let texto = "🛒 Nuevo pedido %0A%0A";
  let total = 0;

  carrito.forEach(p=>{
    texto += "🔹 " + p.nombre + " x" + p.cantidad + " ($" + (p.precio * p.cantidad) + ")%0A";
    total += p.precio * p.cantidad;
  });

  texto += "%0A💰 Total: $" + total;

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
