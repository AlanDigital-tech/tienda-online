<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ff8800);
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.productos {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  padding: 12px;
}

.producto {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.producto img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.agregar {
  width: 100%;
  padding: 10px;
  background: #3483fa;
  color: white;
  border: none;
  border-radius: 6px;
}

/* carrito */
.carrito-btn {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: black;
  color: white;
  padding: 15px;
  border-radius: 50%;
}

.carrito-panel {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: none;
  padding: 15px;
}

.enviar {
  width: 100%;
  background: #25D366;
  color: white;
  padding: 12px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div id="lista" class="productos"></div>

<button class="carrito-btn" onclick="toggleCarrito()">🛒</button>

<div id="carritoPanel" class="carrito-panel">
  <h3>Tu pedido</h3>
  <div id="items"></div>
  <h3 id="total"></h3>
  <button class="enviar" onclick="enviar()">Comprar por WhatsApp</button>
</div>

<script>

const productos = [
{
nombre:"Cargador Tipo C",
precio:4500,
img:"https://images.unsplash.com/photo-1583863788434-e58a36330cf0",
desc:"⚡ Carga rápida 🔋"
},
{
nombre:"Auriculares",
precio:5000,
img:"https://images.unsplash.com/photo-1518441902110-4a96c86e5b05",
desc:"🎧 Sonido HD 🔥"
},
{
nombre:"Parlante",
precio:17000,
img:"https://images.unsplash.com/photo-1585386959984-a41552231698",
desc:"🔊 Potente 💥"
},
{
nombre:"Secador",
precio:11000,
img:"https://images.unsplash.com/photo-1585238342028-4f9fbd3b4b92",
desc:"💨 Profesional"
}
];

let carrito = [];

const lista = document.getElementById("lista");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const panel = document.getElementById("carritoPanel");

/* MOSTRAR */
function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto">
        <img src="${p.img}">
        <h3>${p.nombre}</h3>
        <p>${p.desc}</p>
        <p><b>$${p.precio}</b></p>
        <button class="agregar" onclick="agregar(${i})">Agregar</button>
      </div>
    `;
  });
}

/* CARRITO */
function agregar(i){
  carrito.push(productos[i]);
  actualizar();
}

function actualizar(){
  items.innerHTML="";
  let total = 0;

  carrito.forEach(p=>{
    total += p.precio;
    items.innerHTML += <div>${p.nombre} - $${p.precio}</div>;
  });

  totalTexto.innerText = "Total: $" + total;
}

function toggleCarrito(){
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function enviar(){
  let texto = "Hola quiero comprar:%0A";
  let total = 0;

  carrito.forEach(p=>{
    texto += "- " + p.nombre + "%0A";
    total += p.precio;
  });

  texto += "%0ATotal: $" + total;

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
