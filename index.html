<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 12px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.buscador {
  padding: 10px;
  text-align: center;
  position: relative;
}

.buscador input {
  width: 90%;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.sugerencias {
  position: absolute;
  top: 50px;
  left: 5%;
  width: 90%;
  background: white;
  border-radius: 10px;
}

.sugerencias div {
  padding: 10px;
  cursor: pointer;
}

.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  padding: 10px;
}

.producto {
  background: white;
  border-radius: 10px;
  padding: 8px;
  text-align: center;
}

.producto img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  cursor: pointer;
}

.precio {
  color: green;
  font-weight: bold;
}

.agregar {
  background: green;
  color: white;
  padding: 5px;
  border: none;
}

.carrito-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: blue;
  color: white;
  padding: 12px;
  border-radius: 50px;
}

.carrito-panel {
  position: fixed;
  bottom: 70px;
  right: 10px;
  width: 90%;
  max-width: 300px;
  background: white;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

.detalle {
  display: none;
  padding: 15px;
}

</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div class="buscador">
  <input type="text" id="buscar" placeholder="🔍 Buscar producto...">
  <div id="sugerencias" class="sugerencias"></div>
</div>

<div id="lista" class="productos"></div>
<div id="detalle" class="detalle"></div>

<div class="carrito-btn" onclick="toggleCarrito()">
🛒 (<span id="cantidad">0</span>)
</div>

<div id="carritoPanel" class="carrito-panel">
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button onclick="enviar()">Enviar pedido</button>
</div>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg", desc:"⚡ Carga rápida y segura."},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg", desc:"🎧 Sonido potente."},
{nombre:"Parlante", precio:17000, img:"parlante.jpg", desc:"🔊 Música en todos lados."},
{nombre:"Secador", precio:11000, img:"secador.jpg", desc:"💨 Secado profesional."}
];

let carrito = {};

const lista = document.getElementById("lista");
const detalle = document.getElementById("detalle");
const buscador = document.getElementById("buscar");
const sugerencias = document.getElementById("sugerencias");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const cantidadTexto = document.getElementById("cantidad");

function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto" id="prod-${i}">
        <img src="${p.img}" onclick="verDetalle(${i})">
        <h4>${p.nombre}</h4>
        <p class="precio">$${p.precio}</p>

        <button class="agregar" onclick="sumar(${i})">Agregar</button>
        <div id="cant-${i}">0</div>
      </div>
    `;
  });
}

buscador.addEventListener("keyup", e=>{
  let texto = e.target.value.toLowerCase();
  sugerencias.innerHTML="";
  if(texto==="") return;

  productos.forEach((p,i)=>{
    if(p.nombre.toLowerCase().includes(texto)){
      sugerencias.innerHTML+=<div onclick="irProducto(${i})">${p.nombre}</div>;
    }
  });
});

function irProducto(i){
  document.getElementById("prod-"+i).scrollIntoView({behavior:"smooth"});
  sugerencias.innerHTML="";
}

function verDetalle(i){
  let p = productos[i];
  lista.style.display="none";
  detalle.style.display="block";

  detalle.innerHTML=`
    <button onclick="volver()">⬅ Volver</button>
    <h2>${p.nombre}</h2>
    <img src="${p.img}">
    <h3>$${p.precio}</h3>
    <p>${p.desc}</p>
    <button onclick="sumar(${i})">Agregar al carrito</button>
  `;
}

function volver(){
  detalle.style.display="none";
  lista.style.display="grid";
}

function sumar(i){
  carrito[i]=(carrito[i]||0)+1;
  document.getElementById("cant-"+i).innerText=carrito[i];
  actualizar();
}

function quitar(i){
  delete carrito[i];
  document.getElementById("cant-"+i).innerText=0;
  actualizar();
}

function actualizar(){
  items.innerHTML="";
  let total=0;
  let cantidad=0;

  Object.keys(carrito).forEach(i=>{
    let p=productos[i];
    let cant=carrito[i];

    total+=p.precio*cant;
    cantidad+=cant;

    items.innerHTML+=`
      <div style="display:flex;justify-content:space-between;">
        ${p.nombre} x${cant}
        <button onclick="quitar(${i})">X</button>
      </div>
    `;
  });

  totalTexto.innerText="Total: $"+total;
  cantidadTexto.innerText=cantidad;
}

function toggleCarrito(){
  let panel=document.getElementById("carritoPanel");
  panel.style.display=panel.style.display==="block"?"none":"block";
}

function enviar(){
  let texto="Hola, quiero comprar:%0A";
  let total=0;

  Object.keys(carrito).forEach(i=>{
    let p=productos[i];
    let cant=carrito[i];
    texto+="- "+p.nombre+" x"+cant+"%0A";
    total+=p.precio*cant;
  });

  texto+="%0ATotal: $"+total;

  window.open("https://wa.me/543876629623?text="+texto);
}

mostrarProductos();

</script>

</body>
</html>
