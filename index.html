<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding:10px;text-align:center;font-weight:bold;
}

.buscar {
  width:95%;margin:5px auto;display:block;
  padding:6px;border-radius:8px;border:none;
}

/* GRID */
.productos {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:6px;padding:6px;
}

.producto {
  background:white;border-radius:10px;padding:6px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:160px;
}

.producto img {
  width:100%;
  height:60px;
  object-fit:contain;
}

.producto h4 {
  font-size:10px;margin:2px 0;
}

.precio {
  font-size:11px;color:green;
}

/* BOTÓN */
.agregar {
  background:#00a650;
  color:white;
  border:none;
  border-radius:6px;
  font-size:10px;
  padding:4px;
  width:100%;
}

/* CONTADOR */
.contador {
  font-size:10px;
  margin-top:2px;
}

/* CARRITO */
.carrito-btn {
  position:fixed;bottom:15px;right:15px;
  background:#3483fa;color:white;
  padding:12px;border-radius:50%;
}

.carrito-panel {
  position:fixed;bottom:70px;right:10px;width:90%;
  background:white;padding:10px;border-radius:10px;
  display:none;
}

.item {
  display:flex;justify-content:space-between;
  font-size:13px;margin-bottom:5px;
}

.quitar {
  background:red;color:white;border:none;
}

.enviar {
  width:100%;background:green;color:white;
  padding:8px;border:none;margin-top:8px;
}

/* ZOOM */
.zoom {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.zoom img {
  width: 85%;
  max-height: 80%;
  object-fit: contain;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<input class="buscar" placeholder="Buscar..." onkeyup="buscar(this.value)">

<div id="lista" class="productos"></div>

<div class="carrito-btn" onclick="toggleCarrito()">
🛒 <span id="cantidad">0</span>
</div>

<div id="carritoPanel" class="carrito-panel">
<div id="items"></div>
<h3 id="total">Total: $0</h3>
<button class="enviar" onclick="enviar()">Enviar pedido</button>
</div>

<!-- ZOOM -->
<div id="zoom" class="zoom" onclick="cerrarZoom()">
  <img id="imgZoom">
</div>

<script>

const productos = [
{nombre:"Set de Ollas antiadherente",precio:18000,img:"ollas.jpg"},
{nombre:"Auricular inalámbrico Y60",precio:8000,img:"y60.jpg"},
{nombre:"Banco Banqueta Telescopico plegable",precio:12000,img:"banqueta.jpg"},
{nombre:"Pava Eléctrica 2LTS",precio:14000,img:"pava.jpg"},
{nombre:"Auricular Samsung original -cable",precio:6000,img:"samsung.jpg"},
{nombre:"Licuadora Patrik 3 en 1",precio:20000,img:"licuadora.jpg"},
{nombre:"Termo de Acero - 1L",precio:9000,img:"termo.jpg"},
{nombre:"Secador de cabello DFO",precio:12000,img:"secador.jpg"},
{nombre:"Parlante Knup KP-921BT",precio:19000,img:"knup.jpg"},
{nombre:"Plancha para el cabello",precio:10000,img:"plancha.jpg"},
{nombre:"Tira LED COB USB 5V - 2mts",precio:5000,img:"led.jpg"},
{nombre:"Consola Game Stick Lite 4K",precio:22000,img:"gamestick.jpg"},
{nombre:"TV Box MX9 5G+ 8K Ultra HD",precio:26000,img:"tvbox.jpg"},
{nombre:"Plancha de Vapor Eléctrica BOSNAK",precio:15000,img:"bosnak.jpg"},
{nombre:"Plancha de Vapor Viajero BOSNAK",precio:13000,img:"bosnak2.jpg"},
{nombre:"Juego de Sartenes Antiadherentes",precio:17000,img:"sartenes.jpg"},
{nombre:"Cocina Eléctrica Doble Legatus",precio:25000,img:"cocina.jpg"},
{nombre:"Cable USB Tipo-C Motorola",precio:3000,img:"motorola.jpg"},
{nombre:"Cable USB a USB-C Samsung",precio:3000,img:"cablesamsung.jpg"},
{nombre:"Auriculares Estéreo Inalámbricos IT-BLUE LE-2412",precio:7000,img:"itblue.jpg"},
{nombre:"Dispensador Automático de Aromas",precio:11000,img:"aroma.jpg"},
{nombre:"Cargador de Viaje USB Type-C",precio:5000,img:"cargador.jpg"},
{nombre:"Cargador Portatil 30000mAh",precio:15000,img:"powerbank.jpg"},
{nombre:"Cargador Portátil Cable integrado",precio:12000,img:"power2.jpg"},
{nombre:"Cepillo secador 2 en 1",precio:16000,img:"cepillo.jpg"},
{nombre:"Auricular inalámbrico A6S MiPods",precio:8000,img:"mipods.jpg"},
{nombre:"Cargador USB Turbo Power 4.2A",precio:6000,img:"turbo.jpg"},
{nombre:"Cargador Rápido tipo C",precio:5500,img:"tipoc.jpg"}
];

let carrito = {};

function mostrarProductos(){
  let html="";
  productos.forEach((p,i)=>{
    html+=`
    <div class="producto">
      <img src="${p.img}" onclick="verImg('${p.img}')">
      <h4>${p.nombre}</h4>
      <p class="precio">$${p.precio}</p>
      <button class="agregar" onclick="agregar(${i})">Agregar</button>
      <div id="contador-${i}" class="contador"></div>
    </div>`;
  });
  document.getElementById("lista").innerHTML=html;
}

function agregar(i){
  carrito[i]=(carrito[i]||0)+1;
  actualizar();
}

function quitar(i){
  delete carrito[i];
  actualizar();
}

function actualizar(){
  let itemsHTML="";
  let total=0;
  let cantidad=0;

  productos.forEach((p,i)=>{
    let c=document.getElementById("contador-"+i);
    if(c) c.innerText="";
  });

  Object.keys(carrito).forEach(i=>{
    let p=productos[i];
    let cant=carrito[i];

    total+=p.precio*cant;
    cantidad+=cant;

    document.getElementById("contador-"+i).innerText="x"+cant;

    itemsHTML+=`
    <div class="item">
      ${p.nombre} x${cant}
      <button class="quitar" onclick="quitar(${i})">Quitar</button>
    </div>`;
  });

  document.getElementById("items").innerHTML=itemsHTML;
  document.getElementById("total").innerText="Total: $"+total;
  document.getElementById("cantidad").innerText=cantidad;
}

function toggleCarrito(){
  let c=document.getElementById("carritoPanel");
  c.style.display=c.style.display=="block"?"none":"block";
}

function enviar(){
  let texto="Hola, quiero comprar:%0A";
  let total=0;

  Object.keys(carrito).forEach(i=>{
    let p=productos[i];
    let cant=carrito[i];
    texto+= "- "+p.nombre+" x"+cant+"%0A";
    total+=p.precio*cant;
  });

  texto+="%0ATotal: $"+total;

  window.open("https://wa.me/543876629623?text="+texto);
}

function buscar(txt){
  let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(txt.toLowerCase()));
  let html="";
  filtrados.forEach((p,i)=>{
    html+=`
    <div class="producto">
      <img src="${p.img}" onclick="verImg('${p.img}')">
      <h4>${p.nombre}</h4>
      <p class="precio">$${p.precio}</p>
      <button class="agregar" onclick="agregar(${i})">Agregar</button>
    </div>`;
  });
  document.getElementById("lista").innerHTML=html;
}

/* ZOOM */
function verImg(src){
  document.getElementById("zoom").style.display="flex";
  document.getElementById("imgZoom").src=src;
}

function cerrarZoom(){
  document.getElementById("zoom").style.display="none";
}

mostrarProductos();

</script>

</body>
</html>
