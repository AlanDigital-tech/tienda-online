<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Digital</title><style>
body{font-family:Arial;margin:0;background:#f0f2f5}

header{
background:linear-gradient(90deg,#ffe600,#ffcc00);
padding:15px;
text-align:center;
}

header h1{margin:0}

.search{margin-top:10px}
.search input{width:80%;padding:10px;border-radius:8px;border:none}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{transform:scale(1.05)}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.btn{
margin-top:10px;
padding:8px;
background:#3483fa;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.cart{
position:fixed;
bottom:10px;
right:10px;
background:#111;
color:white;
padding:15px;
border-radius:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

/* vista producto */
#detalle{
display:none;
padding:20px;
text-align:center;
}

#detalle img{
width:80%;
max-width:300px;
border-radius:10px;
}

.back{
margin-top:15px;
padding:10px;
background:#666;
color:white;
border:none;
border-radius:8px;
}

</style></head><body><header>
<h1>🛒 Alan Digital</h1>
<div class="search">
<input placeholder="Buscar productos...">
</div>
</header><div id="productos" class="container"></div><div id="detalle"></div><div class="cart">
🛒 <span id="cartCount">0</span>
<br>
<button onclick="enviarPedido()">Enviar pedido</button>
</div><footer>
📞 WhatsApp: 3876629623
</footer><script>

const productos = [
{name:"Cargador Tipo C", img:"cargador.jpg", desc:"Cargador rápido compatible con múltiples dispositivos."},
{name:"Auriculares MiPods", img:"auriculares.jpg", desc:"Auriculares inalámbricos con excelente sonido."},
{name:"Parlante portátil", img:"parlante.jpg", desc:"Parlante bluetooth ideal para música en cualquier lugar."},
{name:"Secador de cabello", img:"secador.jpg", desc:"Secador potente para uso diario."},
{name:"Batidora de mano", img:"batidora.jpg", desc:"Perfecta para cocina y repostería."},
{name:"Sartenes", img:"sarten.jpg", desc:"Sartenes antiadherentes de alta calidad."},
{name:"TV Box", img:"tvbox.jpg", desc:"Convertí tu TV en Smart TV."},
{name:"Game Stick", img:"gamestick.jpg", desc:"Consola retro con muchos juegos."},
{name:"Tiras LED", img:"led.jpg", desc:"Iluminación LED decorativa USB."},
{name:"Termo 1L", img:"termo.jpg", desc:"Mantiene temperatura por horas."},
{name:"Licuadora", img:"licuadora.jpg", desc:"Licuadora potente de vidrio."}
];

let carrito = [];
const cont = document.getElementById("productos");
const detalle = document.getElementById("detalle");

function mostrarProductos(){
cont.innerHTML="";
productos.forEach(p=>{
cont.innerHTML += `
<div class="card" onclick="verDetalle('${p.name}')">
<img src="${p.img}">
<h3>${p.name}</h3>
<button class="btn" onclick="event.stopPropagation(); agregar('${p.name}')">Agregar</button>
</div>`;
});
}

mostrarProductos();

function verDetalle(nombre){
let p = productos.find(x=>x.name===nombre);
cont.style.display="none";
detalle.style.display="block";

detalle.innerHTML = `
<h2>${p.name}</h2>
<img src="${p.img}">
<p>${p.desc}</p>
<button class="btn" onclick="agregar('${p.name}')">Agregar al carrito</button>
<br><br>
<button class="back" onclick="volver()">Volver</button>
`;
}

function volver(){
detalle.style.display="none";
cont.style.display="grid";
}

function agregar(prod){
carrito.push(prod);
document.getElementById("cartCount").innerText = carrito.length;
}

function enviarPedido(){
let texto = "Hola Alan, quiero estos productos:%0A" + carrito.join("%0A") + "%0A%0AGracias por elegirnos!%20Alan%20Digital";
window.open("https://wa.me/5493876629623?text=" + texto);
}

</script></body>
</html>
