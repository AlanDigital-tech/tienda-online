<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 12px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* BUSCADOR */
.buscador {
  padding: 10px;
  text-align: center;
  position: relative;
}

.buscador input {
  width: 90%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  font-size: 16px;
}

.sugerencias {
  position: absolute;
  top: 50px;
  left: 5%;
  width: 90%;
  background: white;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 1000;
}

.sugerencias div {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.sugerencias div:hover {
  background: #f0f0f0;
}

/* PRODUCTOS */
.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  padding: 10px;
}

.producto {
  background: white;
  border-radius: 10px;
  padding: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.producto img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  cursor: pointer;
}

.precio {
  color: green;
  font-weight: bold;
}

.controles {
  display: flex;
  justify-content: center;
  gap: 5px;
}

.agregar {
  padding: 6px 10px;
  border: none;
  border-radius: 5px;
  background: green;
  color: white;
}

/* CARRITO */
.carrito-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #007bff;
  color: white;
  padding: 12px;
  border-radius: 50px;
  font-size: 16px;
}

.carrito-panel {
  position: fixed;
  bottom: 70px;
  right: 10px;
  width: 90%;
  max-width: 300px;
  background: white;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

.enviar {
  width: 100%;
  background: green;
  color: white;
  padding: 10px;
  border: none;
}

/* DETALLE */
.detalle {
  display: none;
  padding: 15px;
}

.detalle img {
  width: 100%;
  max-width: 300px;
}

</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div class="buscador">
  <input type="text" id="buscar" placeholder="🔍 Buscar producto...">
  <div id="sugerencias" class="sugerencias"></div>
</div>

<div id="lista" class="productos"></div>
<div id="detalle" class="detalle"></div>

<div class="carrito-btn" onclick="toggleCarrito()">
🛒 (<span id="cantidad">0</span>)
</div>

<div id="carritoPanel" class="carrito-panel">
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button class="enviar" onclick="enviar()">Enviar pedido</button>
</div>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg", desc:"⚡ Carga ultra rápida y segura. Ideal para uso diario."},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg", desc:"🎧 Sonido potente y cómodo."},
{nombre:"Parlante", precio:17000, img:"parlante.jpg", desc:"🔊 Música fuerte y clara en cualquier lugar."},
{nombre:"Secador", precio:11000, img:"secador.jpg", desc:"💨 Secado rápido profesional."},
{nombre:"Batidora", precio:13000, img:"batidora.jpg", desc:"🍰 Ideal para cocina rápida."},
{nombre:"Sartenes", precio:16000, img:"sarten.jpg", desc:"🍳 Antiadherente premium."},
{nombre:"TV Box", precio:24000, img:"tvbox.jpg", desc:"📺 Convertí tu TV en Smart."},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg", desc:"🎮 Juegos retro incluidos."},
{nombre:"Tira LED", precio:4500, img:"led.jpg", desc:"💡 Luces modernas y decorativas."},
{nombre:"Termo", precio:8000, img:"termo.jpg", desc:"🧉 Mantiene temperatura por horas."},
{nombre:"Licuadora", precio:15000, img:"licuadora.jpg", desc:"🥤 Potente y duradera."}
];

let carrito = {};

const lista = document.getElementById("lista");
const detalle = document.getElementById("detalle");
const buscador = document.getElementById("buscar");
const sugerencias = document.getElementById("sugerencias");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const cantidadTexto = document.getElementById("cantidad");

// PRODUCTOS
function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto" id="prod-${i}">
        <img src="${p.img}" onclick="verDetalle(${i})">
        <h4>${p.nombre}</h4>
        <p class="precio">$${p.precio}</p>

        <div class="controles">
          <button class="agregar" onclick="sumar(${i})">Agregar</button>
          <span id="cant-${i}">0</span>
        </div>
      </div>
    `;
  });
}

// BUSCADOR
buscador.addEventListener("keyup", e=>{
  let texto = e.target.value.toLowerCase();
  sugerencias.innerHTML="";

  if(texto==="") return;

  productos.forEach((p,i)=>{
    if(p.nombre.toLowerCase().includes(texto)){
      sugerencias.innerHTML+=<div onclick="irProducto(${i})">${p.nombre}</div>;
    }
  });
});

function irProducto(i){
  document.getElementById("prod-"+i).scrollIntoView({behavior:"smooth"});
  sugerencias.innerHTML="";
}

// DETALLE
function verDetalle(i){
  let p = productos[i];

  lista.style.display="none";
  detalle.style.display="block";

  detalle.innerHTML=`
    <button onclick="volver()">⬅ Volver</button>
    <h2>${p.nombre}</h2>
    <img src="${p.img}">
    <h3 style="color:green;">$${p.precio}</h3>
    <p>${p.desc}</p>
    <button onclick="sumar(${i})" style="background:green;color:white;padding:10px;border:none;">
      Agregar al carrito
    </button>
  `;
}

function volver(){
  detalle.style.display="none";
  lista.style.display="grid";
}

// AGREGAR
function sumar(i){
  carrito[i]=(carrito[i]||0)+1;
  document.getElementById("cant-"+i).innerText=carrito[i];
  actualizar();
}

// ACTUALIZAR
function actualizar(){
  items.innerHTML="";
  let total=0;
  let cantidad=0;

  Object.keys(carrito).forEach(i=>{
    let p=productos[i];
    let cant=carrito[i];

    total+=p.precio*cant;
    cantidad+=cant;

    items.innerHTML+=`
      <div>
        ${p.nombre} x${cant}
        <button onclick="quitar(${i})" style="background:red;color:white;border:none;">X</button>
      </div>
    `;
  });

  totalTexto.innerText="Total: $"+total;
  cantidadTexto.innerText=cantidad;
}

// QUITAR SOLO DESDE CARRITO
function quitar(i){
  delete carrito[i];
  document.getElementById("cant-"+i).innerText=0;
  actualizar();
}

// CARRITO
function toggleCarrito(){
  let panel=document.getElementById("carritoPanel");
  panel.style.display=panel.style.display==="block"?"none":"block";
}

// ENVIAR
function enviar(){
  let texto="Hola, quiero comprar:%0A";
  let total=0;

  Object.keys(carrito).forEach(i=>{
    let p=productos[i];
    let cant=carrito[i];
    texto+="- "+p.nombre+" x"+cant+"%0A";
    total+=p.precio*cant;
  });

  texto+="%0ATotal: $"+total;
  texto+="%0AEntrega inmediata";

  window.open("https://wa.me/543876629623?text="+texto);
}

mostrarProductos();

</script>

</body>
</html>
