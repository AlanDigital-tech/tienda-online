<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alan Digital</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 15px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
}

.producto {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.producto:hover {
  transform: scale(1.07);
}

.producto img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.detalle {
  display: none;
  padding: 20px;
  text-align: center;
}

button {
  padding: 10px;
  margin: 10px;
  border: none;
  background: green;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<header>Alan Digital 🛒</header>

<div id="lista" class="productos"></div>
<div id="detalle" class="detalle"></div>

<footer>📱 WhatsApp: 3876629623</footer>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg", desc:"⚡ Carga ultra rápida, ideal para no quedarte sin batería nunca."},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg", desc:"🎧 Sonido potente y cómodo, perfecto para música y llamadas."},
{nombre:"Parlante", precio:17000, img:"parlante.jpg", desc:"🔊 Sonido fuerte y claro para fiestas o uso diario."},
{nombre:"Secador", precio:11000, img:"secador.jpg", desc:"💨 Secado rápido y práctico, ideal para uso diario."},
{nombre:"Batidora", precio:13000, img:"batidora.jpg", desc:"🥣 Fácil y rápida, perfecta para cocinar sin esfuerzo."},
{nombre:"Sartenes", precio:16000, img:"sarten.jpg", desc:"🍳 Antiadherentes, cocina sin que se pegue nada."},
{nombre:"TV Box", precio:24000, img:"tvbox.jpg", desc:"📺 Convertí tu TV en Smart y mirá todo lo que quieras."},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg", desc:"🎮 Juegos retro incluidos, diversión asegurada."},
{nombre:"Tira LED", precio:4500, img:"led.jpg", desc:"🌈 Dale color a tu casa o habitación con estilo."},
{nombre:"Termo", precio:8000, img:"termo.jpg", desc:"🧉 Mantiene la temperatura por horas, ideal para el mate."},
{nombre:"Licuadora", precio:15000, img:"licuadora.jpg", desc:"🍹 Potente y práctica, ideal para jugos y licuados."}
];

let carrito = [];

const lista = document.getElementById("lista");
const detalle = document.getElementById("detalle");

function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto" onclick="verDetalle(${i})">
        <img src="${p.img}">
        <h3>${p.nombre}</h3>
        <p>$${p.precio}</p>
      </div>
    `;
  });
}

function verDetalle(i){
  const p = productos[i];
  lista.style.display="none";
  detalle.style.display="block";

  detalle.innerHTML=`
    <h2>${p.nombre}</h2>
    <img src="${p.img}" width="200">
    <p>${p.desc}</p>
    <h3>$${p.precio}</h3>
    <button onclick="agregar(${i})">Agregar al carrito</button>
    <br>
    <button onclick="volver()">Volver</button>
  `;
}

function volver(){
  detalle.style.display="none";
  lista.style.display="grid";
}

function agregar(i){
  carrito.push(productos[i]);
  alert("Producto agregado");
}

function enviar(){
  if(carrito.length === 0){
    alert("Agregá productos primero");
    return;
  }

  let texto = "Hola, quiero comprar:%0A";
  let total = 0;

  carrito.forEach(p=>{
    texto += "- " + p.nombre + " ($" + p.precio + ")%0A";
    total += p.precio;
  });

  texto += "%0ATotal: $" + total;

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

<button onclick="enviar()" style="position:fixed;bottom:20px;right:20px;">
🛒 Enviar pedido
</button>

</body>
</html>
