<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 15px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
}

.producto {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.producto:hover {
  transform: scale(1.07);
}

.producto img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.detalle {
  display: none;
  padding: 20px;
  text-align: center;
}

.carrito {
  position: fixed;
  top: 60px;
  right: 10px;
  width: 220px;
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.carrito h3 {
  margin-top: 0;
}

.item {
  font-size: 14px;
  margin: 5px 0;
}

button {
  padding: 8px;
  margin: 5px;
  border: none;
  background: green;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.eliminar {
  background: red;
}

footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div id="lista" class="productos"></div>
<div id="detalle" class="detalle"></div>

<div class="carrito">
  <h3>🛒 Carrito</h3>
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button onclick="enviar()">Enviar pedido</button>
</div>

<footer>📱 WhatsApp: 3876629623</footer>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg", desc:"⚡ Carga ultra rápida, nunca te quedes sin batería."},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg", desc:"🎧 Sonido potente y cómodo."},
{nombre:"Parlante", precio:17000, img:"parlante.jpg", desc:"🔊 Ideal para música fuerte y clara."},
{nombre:"Secador", precio:11000, img:"secador.jpg", desc:"💨 Secado rápido y práctico."},
{nombre:"Batidora", precio:13000, img:"batidora.jpg", desc:"🥣 Mezclá todo fácil y rápido."},
{nombre:"Sartenes", precio:16000, img:"sarten.jpg", desc:"🍳 Antiadherente de calidad."},
{nombre:"TV Box", precio:24000, img:"tvbox.jpg", desc:"📺 Convertí tu TV en Smart."},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg", desc:"🎮 Juegos retro incluidos."},
{nombre:"Tira LED", precio:4500, img:"led.jpg", desc:"🌈 Iluminación moderna."},
{nombre:"Termo", precio:8000, img:"termo.jpg", desc:"🧉 Mantiene temperatura por horas."},
{nombre:"Licuadora", precio:15000, img:"licuadora.jpg", desc:"🍹 Potente y práctica."}
];

let carrito = [];

const lista = document.getElementById("lista");
const detalle = document.getElementById("detalle");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");

function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto" onclick="verDetalle(${i})">
        <img src="${p.img}">
        <h3>${p.nombre}</h3>
        <p>$${p.precio}</p>
      </div>
    `;
  });
}

function verDetalle(i){
  const p = productos[i];
  lista.style.display="none";
  detalle.style.display="block";

  detalle.innerHTML=`
    <h2>${p.nombre}</h2>
    <img src="${p.img}" width="200">
    <p>${p.desc}</p>
    <h3>$${p.precio}</h3>
    <button onclick="agregar(${i})">Agregar al carrito</button>
    <br>
    <button onclick="volver()">Volver</button>
  `;
}

function volver(){
  detalle.style.display="none";
  lista.style.display="grid";
}

function agregar(i){
  carrito.push(productos[i]);
  actualizarCarrito();
}

function eliminar(index){
  carrito.splice(index,1);
  actualizarCarrito();
}

function actualizarCarrito(){
  items.innerHTML="";
  let total = 0;

  carrito.forEach((p,i)=>{
    total += p.precio;
    items.innerHTML += `
      <div class="item">
        ${p.nombre} - $${p.precio}
        <button class="eliminar" onclick="eliminar(${i})">X</button>
      </div>
    `;
  });

  totalTexto.innerText = "Total: $" + total;
}

function enviar(){
  if(carrito.length === 0){
    alert("Agregá productos primero");
    return;
  }

  let texto = "Hola, quiero comprar:%0A";
  let total = 0;

  carrito.forEach(p=>{
    texto += "- " + p.nombre + " ($" + p.precio + ")%0A";
    total += p.precio;
  });

  texto += "%0ATotal: $" + total;
  texto += "%0AEntrega inmediata";

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
