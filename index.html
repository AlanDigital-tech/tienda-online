<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  position: sticky;
  top: 0;
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.productos {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 10px;
}

.producto {
  background: white;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.producto img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.precio {
  color: #00a650;
  font-weight: bold;
}

.agregar {
  margin-top: 5px;
  background: #00a650;
  color: white;
  border: none;
  padding: 7px;
  border-radius: 8px;
  width: 100%;
}

.contador {
  font-size: 13px;
}

.carrito-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #3483fa;
  color: white;
  padding: 15px;
  border-radius: 50%;
}

.carrito-panel {
  position: fixed;
  bottom: 80px;
  right: 10px;
  width: 90%;
  background: white;
  border-radius: 15px;
  padding: 15px;
  display: none;
}

.item {
  display: flex;
  justify-content: space-between;
}

.quitar {
  background: red;
  color: white;
  border: none;
}

.enviar {
  width: 100%;
  background: green;
  color: white;
  padding: 10px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div id="lista" class="productos"></div>

<div class="carrito-btn" onclick="toggleCarrito()">
🛒 <span id="cantidad">0</span>
</div>

<div id="carritoPanel" class="carrito-panel">
  <div id="items"></div>
  <h3 id="total">Total: $0</h3>
  <button class="enviar" onclick="enviar()">Enviar pedido</button>
</div>

<script>

const productos = [
{nombre:"Set de Ollas Antiadherente", precio:18000, img:"ollas.jpg"},
{nombre:"Auricular inalámbrico Y60", precio:8000, img:"y60.jpg"},
{nombre:"Banco Banqueta Telescópico", precio:12000, img:"banqueta.jpg"},
{nombre:"Pava Eléctrica 2LTS", precio:14000, img:"pava.jpg"},
{nombre:"Auricular Samsung Original Cable", precio:6000, img:"samsung.jpg"},
{nombre:"Licuadora Patrik 3 en 1", precio:20000, img:"licuadora.jpg"},
{nombre:"Termo de Acero 1L", precio:9000, img:"termo.jpg"},
{nombre:"Secador de Cabello DFO", precio:12000, img:"secador.jpg"},
{nombre:"Parlante Knup KP-921BT", precio:19000, img:"knup.jpg"},
{nombre:"Plancha para el Cabello", precio:10000, img:"plancha.jpg"},
{nombre:"Tira LED COB USB 5V 2mts", precio:5000, img:"led.jpg"},
{nombre:"Consola Game Stick Lite 4K", precio:22000, img:"gamestick.jpg"},
{nombre:"TV Box MX9 5G 8K Ultra HD", precio:26000, img:"tvbox.jpg"},
{nombre:"Plancha de Vapor Eléctrica BOSNAK", precio:15000, img:"bosnak.jpg"},
{nombre:"Plancha de Vapor Viajero BOSNAK", precio:13000, img:"bosnak2.jpg"},
{nombre:"Juego de Sartenes Antiadherentes", precio:17000, img:"sartenes.jpg"},
{nombre:"Cocina Eléctrica Doble Legatus", precio:25000, img:"cocina.jpg"},
{nombre:"Cable USB Tipo-C Motorola", precio:3000, img:"motorola.jpg"},
{nombre:"Cable USB a USB-C Samsung", precio:3000, img:"cablesamsung.jpg"},
{nombre:"Auriculares IT-BLUE LE-2412", precio:7000, img:"itblue.jpg"},
{nombre:"Dispensador Automático de Aromas", precio:11000, img:"aroma.jpg"},
{nombre:"Cargador de Viaje USB Type-C", precio:5000, img:"cargador.jpg"},
{nombre:"Cargador Portátil 30000mAh", precio:15000, img:"powerbank.jpg"},
{nombre:"Cargador Portátil Cable Integrado", precio:12000, img:"power2.jpg"},
{nombre:"Cepillo Secador 2 en 1", precio:16000, img:"cepillo.jpg"},
{nombre:"Auricular A6S MiPods", precio:8000, img:"mipods.jpg"},
{nombre:"Cargador USB Turbo Power 4.2A", precio:6000, img:"turbo.jpg"},
{nombre:"Cargador Rápido Tipo C", precio:5500, img:"tipoc.jpg"}
];

let carrito = {};

const lista = document.getElementById("lista");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const cantidadTexto = document.getElementById("cantidad");

function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto">
        <img src="${p.img}">
        <h4>${p.nombre}</h4>
        <p class="precio">$${p.precio}</p>

        <button class="agregar" onclick="agregar(${i})">Agregar</button>
        <div id="contador-${i}" class="contador"></div>
      </div>
    `;
  });
}

function agregar(i){
  carrito[i] = (carrito[i] || 0) + 1;
  actualizar();
}

function quitar(i){
  delete carrito[i];
  actualizar();
}

function actualizar(){
  items.innerHTML="";
  let total = 0;
  let cantidad = 0;

  productos.forEach((p,i)=>{
    let cont = document.getElementById("contador-"+i);
    if(cont) cont.innerText = "";
  });

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];

    total += p.precio * cant;
    cantidad += cant;

    document.getElementById("contador-"+i).innerText = "x" + cant;

    items.innerHTML += `
      <div class="item">
        ${p.nombre} x${cant}
        <button class="quitar" onclick="quitar(${i})">Quitar</button>
      </div>
    `;
  });

  totalTexto.innerText = "Total: $" + total;
  cantidadTexto.innerText = cantidad;
}

function toggleCarrito(){
  let panel = document.getElementById("carritoPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function enviar(){
  let texto = "Hola, quiero comprar:%0A";
  let total = 0;

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];
    texto += "- " + p.nombre + " x" + cant + "%0A";
    total += p.precio * cant;
  });

  texto += "%0ATotal: $" + total;

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
