<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 12px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.productos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  padding: 10px;
}

.producto {
  background: white;
  border-radius: 10px;
  padding: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.producto img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.precio {
  color: green;
  font-weight: bold;
}

.agregar {
  background: green;
  color: white;
  padding: 6px 10px;
  border: none;
  border-radius: 5px;
}

.carrito-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #007bff;
  color: white;
  padding: 12px;
  border-radius: 50px;
}

.carrito-panel {
  position: fixed;
  bottom: 70px;
  right: 10px;
  width: 90%;
  max-width: 320px;
  background: white;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

.quitar {
  background: red;
  color: white;
  border: none;
  padding: 3px 8px;
  margin-left: 10px;
  border-radius: 5px;
}

.enviar {
  width: 100%;
  background: green;
  color: white;
  padding: 10px;
  border: none;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div id="lista" class="productos"></div>

<div class="carrito-btn" onclick="toggleCarrito()">
🛒 (<span id="cantidad">0</span>)
</div>

<div id="carritoPanel" class="carrito-panel">
  <div id="items"></div>
  <h4 id="total">Total: $0</h4>
  <button class="enviar" onclick="enviar()">Enviar pedido</button>
</div>

<script>

const productos = [
{nombre:"Cargador Tipo C", precio:4500, img:"cargador.jpg"},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg"},
{nombre:"Parlante", precio:17000, img:"parlante.jpg"},
{nombre:"Secador", precio:11000, img:"secador.jpg"},
{nombre:"Batidora", precio:13000, img:"batidora.jpg"},
{nombre:"Sartenes", precio:16000, img:"sarten.jpg"},
{nombre:"TV Box", precio:24000, img:"tvbox.jpg"},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg"},
{nombre:"Tira LED", precio:4500, img:"led.jpg"},
{nombre:"Termo", precio:8000, img:"termo.jpg"},
{nombre:"Licuadora", precio:15000, img:"licuadora.jpg"},

{nombre:"Cargador rápido Tipo C", precio:4500, img:"cargador_rapido.jpg"},
{nombre:"Cargador rápido Legatus", precio:5000, img:"legatus.jpg"},
{nombre:"Cargador portátil cable integrado", precio:9000, img:"portatil.jpg"},
{nombre:"Cargador portátil 30000mAh", precio:15000, img:"30000mah.jpg"},
{nombre:"Dispensador automático de aroma", precio:12000, img:"aroma.jpg"},
{nombre:"Anafe eléctrico", precio:20000, img:"anafe.jpg"},
{nombre:"Auriculares MiPods", precio:8000, img:"mipods.jpg"},
{nombre:"Auriculares IT-BLUE LE-2412", precio:9500, img:"itblue.jpg"},
{nombre:"Cable USB-C Samsung", precio:3000, img:"samsung.jpg"},
{nombre:"Cable USB-C Motorola", precio:3000, img:"motorola.jpg"},
{nombre:"Batidora Luma Bella", precio:13000, img:"lumabella.jpg"},
{nombre:"Juego sartenes antiadherentes", precio:16000, img:"sarten2.jpg"},
{nombre:"TV Box MX9 5G 7K", precio:24000, img:"mx9.jpg"},
{nombre:"Game Stick Lite 4K", precio:22000, img:"stick4k.jpg"},
{nombre:"Tira LED COB USB", precio:4500, img:"cob.jpg"},
{nombre:"Parlante portátil", precio:17000, img:"parlante2.jpg"},
{nombre:"Parlante Knup KP-917BT", precio:19000, img:"knup.jpg"},
{nombre:"Planchita de pelo", precio:10000, img:"planchita.jpg"}
];

let carrito = {};

const lista = document.getElementById("lista");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const cantidadTexto = document.getElementById("cantidad");

function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto">
        <img src="${p.img}">
        <h4>${p.nombre}</h4>
        <p class="precio">$${p.precio}</p>

        <div>
          <button class="agregar" onclick="agregar(${i})">Agregar</button>
          <span id="contador-${i}"></span>
        </div>
      </div>
    `;
  });
}

function agregar(i){
  carrito[i] = (carrito[i] || 0) + 1;
  actualizar();
}

function quitar(i){
  delete carrito[i];
  actualizar();
}

function actualizar(){
  items.innerHTML="";
  let total = 0;
  let cantidad = 0;

  // limpiar contadores
  productos.forEach((p,i)=>{
    let cont = document.getElementById("contador-"+i);
    if(cont) cont.innerText = "";
  });

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];

    total += p.precio * cant;
    cantidad += cant;

    // mostrar x1, x2, etc
    document.getElementById("contador-"+i).innerText = " x" + cant;

    items.innerHTML += `
      <div>
        ${p.nombre} x${cant}
        <button class="quitar" onclick="quitar(${i})">Quitar</button>
      </div>
    `;
  });

  totalTexto.innerText = "Total: $" + total;
  cantidadTexto.innerText = cantidad;
}

function toggleCarrito(){
  let panel = document.getElementById("carritoPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function enviar(){
  let texto = "Hola, quiero comprar:%0A";
  let total = 0;

  Object.keys(carrito).forEach(i=>{
    let p = productos[i];
    let cant = carrito[i];
    texto += "- " + p.nombre + " x" + cant + "%0A";
    total += p.precio * cant;
  });

  texto += "%0ATotal: $" + total;

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
