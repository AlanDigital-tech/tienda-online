<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alan Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: linear-gradient(90deg,#ffcc00,#ff8800);
  padding: 18px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

/* PRODUCTOS */
.productos {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.producto {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.producto:hover {
  transform: scale(1.03);
}

.producto img {
  width: 100%;
  height: 150px;
  border-radius: 10px;
  object-fit: cover;
}

/* BOTON */
.agregar {
  width: 100%;
  padding: 10px;
  background: #3483fa;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
}

/* ANIMACION */
.animar {
  position: fixed;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  z-index: 999;
  transition: all 0.7s ease;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  padding: 20px;
}

/* BOTON CARRITO */
.carrito-btn {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: black;
  color: white;
  font-size: 22px;
  padding: 15px;
  border-radius: 50%;
}

/* PANEL */
.carrito-panel {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: none;
  padding: 15px;
}

/* PAGO */
.pago {
  margin-top: 10px;
}

.enviar {
  width: 100%;
  background: #25D366;
  color: white;
  padding: 12px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<div id="lista" class="productos"></div>

<div id="modal" class="modal"></div>

<button class="carrito-btn" onclick="abrirCarrito()">🛒</button>

<div id="carritoPanel" class="carrito-panel">
  <h3>Tu pedido</h3>
  <div id="items"></div>
  <h3 id="total"></h3>

  <div class="pago">
    <label>Método de pago:</label>
    <select id="metodo">
      <option>Efectivo</option>
      <option>Transferencia</option>
      <option>MercadoPago</option>
    </select>
  </div>

  <button class="enviar" onclick="confirmar()">Finalizar compra</button>
</div>

<script>

const productos = [
{nombre:"Cargador", precio:4500, img:"cargador.jpg", desc:"⚡ Carga rápida"},
{nombre:"Auriculares", precio:5000, img:"auriculares.jpg", desc:"🎧 Sonido HD"},
{nombre:"Parlante", precio:17000, img:"parlante.jpg", desc:"🔊 Potente"},
{nombre:"Secador", precio:11000, img:"secador.jpg", desc:"💨 Profesional"}
];

let carrito = [];

const lista = document.getElementById("lista");
const items = document.getElementById("items");
const totalTexto = document.getElementById("total");
const panel = document.getElementById("carritoPanel");

/* MOSTRAR */
function mostrarProductos(){
  lista.innerHTML="";
  productos.forEach((p,i)=>{
    lista.innerHTML+=`
      <div class="producto">
        <img src="${p.img}" id="img${i}">
        <h3>${p.nombre}</h3>
        <p>$${p.precio}</p>
        <button class="agregar" onclick="animar(${i})">Agregar</button>
      </div>
    `;
  });
}

/* ANIMACION */
function animar(i){
  const img = document.getElementById("img"+i);
  const rect = img.getBoundingClientRect();

  const clone = img.cloneNode();
  clone.classList.add("animar");
  clone.style.top = rect.top+"px";
  clone.style.left = rect.left+"px";

  document.body.appendChild(clone);

  setTimeout(()=>{
    clone.style.top = "90%";
    clone.style.left = "90%";
    clone.style.width = "20px";
    clone.style.height = "20px";
  },10);

  setTimeout(()=>{
    clone.remove();
    agregar(i);
  },700);
}

/* CARRITO */
function agregar(i){
  let item = carrito.find(p => p.nombre === productos[i].nombre);

  if(item){
    item.cantidad++;
  } else {
    carrito.push({...productos[i], cantidad:1});
  }

  actualizar();
}

function actualizar(){
  items.innerHTML="";
  let total = 0;

  carrito.forEach(p=>{
    total += p.precio * p.cantidad;
    items.innerHTML += <div>${p.nombre} x${p.cantidad}</div>;
  });

  totalTexto.innerText = "Total: $" + total;
}

function abrirCarrito(){
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

/* CONFIRMACION */
function confirmar(){
  if(carrito.length === 0){
    alert("Carrito vacío");
    return;
  }

  let metodo = document.getElementById("metodo").value;

  let ok = confirm("Confirmar compra con " + metodo + "?");

  if(ok){
    enviar(metodo);
  }
}

/* WHATSAPP */
function enviar(metodo){
  let texto = "🛒 Pedido:%0A";
  let total = 0;

  carrito.forEach(p=>{
    texto += "- " + p.nombre + " x" + p.cantidad + "%0A";
    total += p.precio * p.cantidad;
  });

  texto += "%0ATotal: $" + total;
  texto += "%0A💳 Pago: " + metodo;

  window.open("https://wa.me/543876629623?text=" + texto);
}

mostrarProductos();

</script>

</body>
</html>
