<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: linear-gradient(90deg,#ffcc00,#ffaa00);
  padding: 10px;
  text-align: center;
  font-weight: bold;
}

/* BUSCADOR */
.buscar {
  width: 95%;
  margin: 5px auto;
  display: block;
  padding: 6px;
  border-radius: 8px;
  border: none;
}

/* CATEGORÍAS */
.categorias {
  display: flex;
  overflow-x: auto;
  gap: 5px;
  padding: 5px;
}

.categorias button {
  border: none;
  background: #ddd;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* GRID PRO */
.productos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 6px;
  padding: 6px;
}

.producto {
  background: white;
  border-radius: 10px;
  padding: 5px;
  text-align: center;
}

.producto img {
  width: 100%;
  height: 70px;
  object-fit: contain;
}

.producto h4 {
  font-size: 10px;
}

.precio {
  font-size: 11px;
  color: green;
}

.agregar {
  font-size: 10px;
  width: 100%;
}

.contador {
  font-size: 10px;
}

/* CARRITO */
.carrito-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #3483fa;
  color: white;
  padding: 12px;
  border-radius: 50%;
}

.carrito-panel {
  position: fixed;
  bottom: 70px;
  right: 10px;
  width: 90%;
  background: white;
  display: none;
  padding: 10px;
}

/* ZOOM */
.zoom {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.zoom img {
  width: 80%;
}
</style>
</head>

<body>

<header>Alan Store 🛒</header>

<input class="buscar" placeholder="Buscar producto..." onkeyup="buscar(this.value)">

<div class="categorias">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('hogar')">Hogar</button>
<button onclick="filtrar('electronica')">Electrónica</button>
</div>

<div id="lista" class="productos"></div>

<div class="carrito-btn" onclick="toggleCarrito()">🛒 <span id="cantidad">0</span></div>

<div id="carritoPanel" class="carrito-panel">
<div id="items"></div>
<h3 id="total"></h3>
<button onclick="enviar()">Enviar</button>
</div>

<!-- ZOOM -->
<div id="zoom" class="zoom" onclick="cerrarZoom()">
<img id="imgZoom">
</div>

<script>

const productos = [
{nombre:"Set de Ollas", precio:18000, img:"ollas.jpg", cat:"hogar"},
{nombre:"Auricular Y60", precio:8000, img:"y60.jpg", cat:"electronica"},
{nombre:"Banco plegable", precio:12000, img:"banqueta.jpg", cat:"hogar"},
{nombre:"Pava eléctrica", precio:14000, img:"pava.jpg", cat:"hogar"},
{nombre:"Auricular Samsung", precio:6000, img:"samsung.jpg", cat:"electronica"},
{nombre:"Licuadora", precio:20000, img:"licuadora.jpg", cat:"hogar"},
{nombre:"Termo", precio:9000, img:"termo.jpg", cat:"hogar"},
{nombre:"Secador", precio:12000, img:"secador.jpg", cat:"hogar"},
{nombre:"Parlante Knup", precio:19000, img:"knup.jpg", cat:"electronica"},
{nombre:"Plancha pelo", precio:10000, img:"plancha.jpg", cat:"hogar"},
{nombre:"Tira LED", precio:5000, img:"led.jpg", cat:"electronica"},
{nombre:"Game Stick", precio:22000, img:"gamestick.jpg", cat:"electronica"},
{nombre:"TV Box", precio:26000, img:"tvbox.jpg", cat:"electronica"},
{nombre:"Plancha vapor", precio:15000, img:"bosnak.jpg", cat:"hogar"},
{nombre:"Cocina eléctrica", precio:25000, img:"cocina.jpg", cat:"hogar"},
{nombre:"Cable USB-C", precio:3000, img:"cable.jpg", cat:"electronica"}
];

let carrito = {};
let listaFiltrada = productos;

const lista = document.getElementById("lista");

function mostrarProductos(){
  lista.innerHTML="";
  listaFiltrada.forEach((p,i)=>{
    lista.innerHTML+=`
    <div class="producto">
      <img src="${p.img}" onclick="verImg('${p.img}')">
      <h4>${p.nombre}</h4>
      <p class="precio">$${p.precio}</p>
      <button onclick="agregar(${i})">Agregar</button>
      <div id="contador-${i}"></div>
    </div>`;
  });
}

function buscar(txt){
  listaFiltrada = productos.filter(p=>p.nombre.toLowerCase().includes(txt.toLowerCase()));
  mostrarProductos();
}

function filtrar(cat){
  if(cat=="todos") listaFiltrada = productos;
  else listaFiltrada = productos.filter(p=>p.cat==cat);
  mostrarProductos();
}

function agregar(i){
  carrito[i]=(carrito[i]||0)+1;
  actualizar();
}

function actualizar(){
  let cantidad=0;
  Object.values(carrito).forEach(c=>cantidad+=c);
  document.getElementById("cantidad").innerText=cantidad;
}

function toggleCarrito(){
  let c=document.getElementById("carritoPanel");
  c.style.display=c.style.display=="block"?"none":"block";
}

function enviar(){
  alert("Pedido enviado");
}

/* ZOOM */
function verImg(src){
  document.getElementById("zoom").style.display="flex";
  document.getElementById("imgZoom").src=src;
}

function cerrarZoom(){
  document.getElementById("zoom").style.display="none";
}

mostrarProductos();

</script>

</body>
</html>
